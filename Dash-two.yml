title: Home
views:
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: repeat(12, 1fr)
      grid-auto-rows: min-content
      grid-gap: 12px
      margin: 0
    cards:
      - type: markdown
        content: |
          # General overview
          Everything important at a glance
        card_mod:
          style: |
            ha-card {
              background: rgba(var(--rgb-card-background-color), 0.72);
              border: 1px solid rgba(180, 190, 254, 0.18);
              border-radius: 22px;
              box-shadow: none;
              padding: 4px 10px 0 10px;
            }
        view_layout:
          grid-column: 1 / 13
      - type: custom:mushroom-chips-card
        alignment: justify
        chips:
          - type: template
            icon: mdi:home
            content: >
              {% if is_state('person.eduward_post', 'home') %}Home{% else
              %}Away{% endif %}
            icon_color: >
              {% if is_state('person.eduward_post', 'home') %}green{% else
              %}amber{% endif %}
            tap_action:
              action: more-info
              entity: person.eduward_post
          - type: template
            icon: mdi:shield-home
            content: |
              {% if is_state('alarm_control_panel.alarm', 'armed_away')
                    or is_state('alarm_control_panel.alarm', 'armed_home')
                    or is_state('alarm_control_panel.alarm', 'armed_night') %}
                Armed
              {% else %}
                Disarmed
              {% endif %}
            icon_color: |
              {% if is_state('alarm_control_panel.alarm', 'armed_away')
                    or is_state('alarm_control_panel.alarm', 'armed_home')
                    or is_state('alarm_control_panel.alarm', 'armed_night') %}
                green
              {% else %}
                red
              {% endif %}
          - type: template
            icon: mdi:solar-power
            content: '{{ states(''sensor.inverter_total_power'') }} W'
            icon_color: yellow
          - type: template
            icon: mdi:transmission-tower-import
            content: >-
              {{ states('sensor.dsmr_reading_electricity_currently_delivered')
              }}
            icon_color: blue
          - type: template
            icon: mdi:transmission-tower-export
            content: '{{ states(''sensor.dsmr_reading_electricity_currently_returned'') }}'
            icon_color: teal
          - type: template
            icon: mdi:download-network
            content: >
              {{ states('sensor.speedtest_download')|round(0) }} / {{
              states('sensor.speedtest_upload')|round(0) }}
            icon_color: blue
          - type: template
            icon: mdi:update
            content: |
              {% set updates = [
                states('update.home_assistant_core_update'),
                states('update.home_assistant_operating_system_update'),
                states('update.home_assistant_supervisor_update'),
                states('update.hacs_update'),
                states('update.mikrotik_router_update'),
                states('update.proxmox_ve_update'),
                states('update.synology_dsm_update'),
                states('update.synology_nas_dsm_update'),
                states('update.zigbee2mqtt_update'),
                states('update.esphome_update'),
                states('update.z_wave_js_ui_update'),
                states('update.studio_code_server_update')
              ] %} {{ updates | select('eq', 'on') | list | count }} updates
            icon_color: >
              {% set updates = [
                states('update.home_assistant_core_update'),
                states('update.home_assistant_operating_system_update'),
                states('update.home_assistant_supervisor_update'),
                states('update.hacs_update'),
                states('update.mikrotik_router_update'),
                states('update.proxmox_ve_update'),
                states('update.synology_dsm_update'),
                states('update.synology_nas_dsm_update'),
                states('update.zigbee2mqtt_update'),
                states('update.esphome_update'),
                states('update.z_wave_js_ui_update'),
                states('update.studio_code_server_update')
              ] %} {% if (updates | select('eq', 'on') | list | count) > 0
              %}amber{% else %}green{% endif %}
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid rgba(180, 190, 254, 0.18);
              background: rgba(30, 30, 46, 0.72);
              box-shadow: none;
              padding: 10px;
            }
            mushroom-template-chip, mushroom-entity-chip {
              margin: 2px !important;
            }
        view_layout:
          grid-column: 1 / 13
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:button-card
            entity: alarm_control_panel.alarm
            name: Alarm
            icon: mdi:shield-home
            show_state: true
            tap_action:
              action: more-info
            styles:
              card:
                - border-radius: 22px
                - padding: 18px 12px
                - border: 1px solid rgba(180, 190, 254, 0.18)
                - background: rgba(30, 30, 46, 0.72)
              icon:
                - width: 34px
              name:
                - font-size: 17px
                - font-weight: 600
              state:
                - font-size: 14px
            state:
              - value: disarmed
                color: rgb(243, 139, 168)
              - value: armed_home
                color: rgb(166, 227, 161)
              - value: armed_away
                color: rgb(137, 180, 250)
              - value: armed_night
                color: rgb(203, 166, 247)
          - type: custom:button-card
            entity: sensor.speedtest_ping
            name: Internet
            icon: mdi:speedometer
            show_state: true
            state_display: >
              [[[ return `${states['sensor.speedtest_ping']?.state ?? '-'} ms`;
              ]]]
            styles:
              card:
                - border-radius: 22px
                - padding: 18px 12px
                - border: 1px solid rgba(180, 190, 254, 0.18)
                - background: rgba(30, 30, 46, 0.72)
              icon:
                - width: 34px
              name:
                - font-size: 17px
                - font-weight: 600
              state:
                - font-size: 14px
            color: rgb(137, 180, 250)
          - type: custom:button-card
            entity: binary_sensor.prometheus_status
            name: Monitoring
            icon: mdi:chart-line
            show_state: true
            tap_action:
              action: navigate
              navigation_path: /lovelace/homelab
            styles:
              card:
                - border-radius: 22px
                - padding: 18px 12px
                - border: 1px solid rgba(180, 190, 254, 0.18)
                - background: rgba(30, 30, 46, 0.72)
              icon:
                - width: 34px
              name:
                - font-size: 17px
                - font-weight: 600
              state:
                - font-size: 14px
            state:
              - value: 'on'
                color: rgb(166, 227, 161)
              - value: 'off'
                color: rgb(243, 139, 168)
        view_layout:
          grid-column: 1 / 13
      - type: custom:stack-in-card
        cards:
          - type: custom:mushroom-title-card
            title: House status
            subtitle: Modes, doors, motion and presence
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: input_boolean.guest_mode
                primary: Guest mode
                secondary: |
                  {% if is_state(entity, 'on') %}Enabled{% else %}Off{% endif %}
                icon: mdi:account-group
                icon_color: >
                  {% if is_state(entity, 'on') %}blue{% else %}disabled{% endif
                  %}
              - type: custom:mushroom-template-card
                entity: input_boolean.vacation_mode
                primary: Vacation mode
                secondary: |
                  {% if is_state(entity, 'on') %}Enabled{% else %}Off{% endif %}
                icon: mdi:airplane
                icon_color: >
                  {% if is_state(entity, 'on') %}orange{% else %}disabled{%
                  endif %}
              - type: custom:mushroom-template-card
                entity: input_boolean.slaap_modus
                primary: Sleep mode
                secondary: >
                  {% if is_state(entity, 'on') %}Active{% else %}Inactive{%
                  endif %}
                icon: mdi:sleep
                icon_color: >
                  {% if is_state(entity, 'on') %}purple{% else %}disabled{%
                  endif %}
              - type: custom:mushroom-template-card
                entity: binary_sensor.frontdoor_open
                primary: Front door
                secondary: >
                  {% if is_state('binary_sensor.frontdoor_open', 'on') %}Open{%
                  else %}Closed{% endif %}
                icon: mdi:door-front
                icon_color: >
                  {% if is_state('binary_sensor.frontdoor_open', 'on') %}red{%
                  else %}green{% endif %}
              - type: custom:mushroom-template-card
                entity: binary_sensor.front_door_motion
                primary: Front motion
                secondary: >
                  {% if is_state(entity, 'on') %}Detected{% else %}Clear{% endif
                  %}
                icon: mdi:motion-sensor
                icon_color: |
                  {% if is_state(entity, 'on') %}red{% else %}green{% endif %}
              - type: custom:mushroom-template-card
                entity: binary_sensor.back_yard_motion_sensor_motion_detection
                primary: Backyard motion
                secondary: >
                  {% if is_state(entity, 'on') %}Detected{% else %}Clear{% endif
                  %}
                icon: mdi:motion-sensor
                icon_color: |
                  {% if is_state(entity, 'on') %}red{% else %}green{% endif %}
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid rgba(180, 190, 254, 0.18);
              background: rgba(30, 30, 46, 0.72);
              box-shadow: none;
            }
        view_layout:
          grid-column: 1 / 5
      - type: custom:stack-in-card
        cards:
          - type: custom:mushroom-title-card
            title: Power snapshot
            subtitle: Current import/export, solar and today cost
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-entity-card
                entity: sensor.inverter_total_power
                name: Solar now
                icon: mdi:solar-power
              - type: custom:mushroom-entity-card
                entity: sensor.dsmr_reading_electricity_currently_delivered
                name: Grid import
                icon: mdi:transmission-tower-import
              - type: custom:mushroom-entity-card
                entity: sensor.dsmr_reading_electricity_currently_returned
                name: Grid export
                icon: mdi:transmission-tower-export
              - type: custom:mushroom-entity-card
                entity: sensor.dsmr_day_consumption_total_cost
                name: Today's cost
                icon: mdi:currency-eur
              - type: custom:mushroom-entity-card
                entity: sensor.dsmr_consumption_gas_currently_delivered
                name: Gas now
                icon: mdi:fire
              - type: custom:mushroom-entity-card
                entity: sensor.co2_signal_co2_intensity
                name: Grid CO₂
                icon: mdi:molecule-co2
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid rgba(180, 190, 254, 0.18);
              background: rgba(30, 30, 46, 0.72);
              box-shadow: none;
            }
        view_layout:
          grid-column: 5 / 9
      - type: custom:stack-in-card
        cards:
          - type: custom:mushroom-title-card
            title: Security snapshot
            subtitle: SIEM, NAS and monitored services
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-entity-card
                entity: sensor.siem_security_score
                name: SIEM score
                icon: mdi:shield-check
              - type: custom:mushroom-entity-card
                entity: sensor.wazuh_high_24h
                name: High alerts 24h
                icon: mdi:alert
              - type: custom:mushroom-entity-card
                entity: sensor.wazuh_critical_24h
                name: Critical alerts 24h
                icon: mdi:alert-octagon
              - type: custom:mushroom-entity-card
                entity: binary_sensor.synology_security_status
                name: Synology security
                icon: mdi:nas
              - type: custom:mushroom-entity-card
                entity: sensor.home_assistant_certificate_expiry
                name: HA cert expiry
                icon: mdi:certificate-outline
              - type: custom:mushroom-entity-card
                entity: sensor.unifi_controller_status
                name: UniFi uptime
                icon: mdi:wifi
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid rgba(180, 190, 254, 0.18);
              background: rgba(30, 30, 46, 0.72);
              box-shadow: none;
            }
        view_layout:
          grid-column: 9 / 13
      - type: custom:apexcharts-card
        header:
          show: true
          title: Live power trend
          show_states: true
          colorize_states: true
        graph_span: 12h
        span:
          start: day
        now:
          show: true
        series:
          - entity: sensor.inverter_total_power
            name: Solar
            type: line
            group_by:
              func: avg
              duration: 5min
          - entity: sensor.dsmr_reading_electricity_currently_delivered
            name: Import
            type: line
            group_by:
              func: avg
              duration: 5min
          - entity: sensor.dsmr_reading_electricity_currently_returned
            name: Export
            type: line
            group_by:
              func: avg
              duration: 5min
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid rgba(180, 190, 254, 0.18);
              background: rgba(30, 30, 46, 0.72);
              box-shadow: none;
            }
        view_layout:
          grid-column: 1 / 7
      - type: custom:stack-in-card
        cards:
          - type: custom:mushroom-title-card
            title: Homelab status
            subtitle: Core services and containers
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: binary_sensor.prometheus_status
                primary: Prometheus
                secondary: '{{ states(''sensor.prometheus_state'') }}'
                icon: mdi:chart-line
                icon_color: |
                  {% if is_state(entity, 'on') %}green{% else %}red{% endif %}
              - type: custom:mushroom-template-card
                entity: binary_sensor.loki_status
                primary: Loki
                secondary: '{{ states(''sensor.loki_state'') }}'
                icon: mdi:database-search
                icon_color: |
                  {% if is_state(entity, 'on') %}green{% else %}red{% endif %}
              - type: custom:mushroom-template-card
                entity: binary_sensor.uptime_kuma_status
                primary: Uptime Kuma
                secondary: '{{ states(''sensor.uptime_kuma_state'') }}'
                icon: mdi:heart-pulse
                icon_color: |
                  {% if is_state(entity, 'on') %}green{% else %}red{% endif %}
              - type: custom:mushroom-template-card
                entity: sensor.home_assistant_status
                primary: Home Assistant
                secondary: '{{ states(''sensor.home_assistant_status'') }}'
                icon: mdi:home-assistant
                icon_color: >
                  {% if is_state('sensor.home_assistant_status', 'up') or
                  is_state('sensor.home_assistant_status', 'online') %}
                    green
                  {% else %}
                    red
                  {% endif %}
              - type: custom:mushroom-template-card
                entity: sensor.local_containers_running
                primary: Containers running
                secondary: >
                  {{ states('sensor.local_containers_running') }} / {{
                  states('sensor.local_container_count') }}
                icon: mdi:docker
                icon_color: teal
              - type: custom:mushroom-template-card
                entity: sensor.speedtest_ping
                primary: Internet quality
                secondary: |
                  {{ states('sensor.speedtest_ping') }} ms ping
                icon: mdi:speedometer
                icon_color: blue
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid rgba(180, 190, 254, 0.18);
              background: rgba(30, 30, 46, 0.72);
              box-shadow: none;
            }
        view_layout:
          grid-column: 7 / 13
      - type: custom:stack-in-card
        cards:
          - type: custom:mushroom-title-card
            title: Quick cameras
            subtitle: Front and outside
          - type: grid
            columns: 2
            square: false
