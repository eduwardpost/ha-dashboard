  - title: Homelab
    path: homelab
    icon: mdi:server
    type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: repeat(12, 1fr)
      grid-auto-rows: min-content
      grid-gap: 12px
      margin: 0
    cards:
      - type: markdown
        content: |
          # Homelab & administration
          Infra, uptime, containers, updates and backup health
        card_mod:
          style: |
            ha-card {
              background: rgba(var(--rgb-card-background-color), 0.72);
              border: 1px solid rgba(180, 190, 254, 0.18);
              border-radius: 22px;
              box-shadow: none;
              padding: 4px 10px 0 10px;
            }
        view_layout:
          grid-column: 1 / 13
      - type: custom:mushroom-chips-card
        alignment: justify
        chips:
          - type: template
            icon: mdi:docker
            content: >
              {{ states('sensor.local_containers_running') }} / {{
              states('sensor.local_container_count') }}
            icon_color: blue
          - type: template
            icon: mdi:backup-restore
            content: '{{ states(''sensor.backup_backup_manager_state'') }}'
            icon_color: >
              {% if states('sensor.backup_backup_manager_state') in ['idle',
              'ready', 'ok'] %}green{% else %}amber{% endif %}
          - type: template
            icon: mdi:download-network
            content: >
              {{ states('sensor.speedtest_download')|round(0) }}↓ {{
              states('sensor.speedtest_upload')|round(0) }}↑
            icon_color: teal
          - type: template
            icon: mdi:update
            content: |
              {% set updates = [
                states('update.home_assistant_core_update'),
                states('update.home_assistant_operating_system_update'),
                states('update.home_assistant_supervisor_update'),
                states('update.hacs_update'),
                states('update.mikrotik_router_update'),
                states('update.proxmox_ve_update'),
                states('update.synology_dsm_update'),
                states('update.synology_nas_dsm_update'),
                states('update.zigbee2mqtt_update'),
                states('update.esphome_update'),
                states('update.z_wave_js_ui_update'),
                states('update.studio_code_server_update')
              ] %} {{ updates | select('eq', 'on') | list | count }} pending
            icon_color: >
              {% set updates = [
                states('update.home_assistant_core_update'),
                states('update.home_assistant_operating_system_update'),
                states('update.home_assistant_supervisor_update'),
                states('update.hacs_update'),
                states('update.mikrotik_router_update'),
                states('update.proxmox_ve_update'),
                states('update.synology_dsm_update'),
                states('update.synology_nas_dsm_update'),
                states('update.zigbee2mqtt_update'),
                states('update.esphome_update'),
                states('update.z_wave_js_ui_update'),
                states('update.studio_code_server_update')
              ] %} {% if (updates | select('eq', 'on') | list | count) > 0
              %}amber{% else %}green{% endif %}
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid rgba(180, 190, 254, 0.18);
              background: rgba(30, 30, 46, 0.72);
              box-shadow: none;
              padding: 10px;
            }
            mushroom-template-chip, mushroom-entity-chip {
              margin: 2px !important;
            }
        view_layout:
          grid-column: 1 / 13
      - type: grid
        columns: 6
