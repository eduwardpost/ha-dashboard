          }
      view_layout:
        grid-column: 1 / 7
      


  - title: Energy
    path: energy
    icon: mdi:lightning-bolt
    type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: repeat(12, 1fr)
      grid-auto-rows: min-content
      grid-gap: 12px
      margin: 0
    cards:      
      - type: custom:mushroom-chips-card
        alignment: justify
        chips:
          - type: entity
            entity: sensor.inverter_total_power
            icon: mdi:solar-power
          - type: entity
            entity: sensor.dsmr_reading_electricity_currently_delivered
            icon: mdi:transmission-tower-import
          - type: entity
            entity: sensor.dsmr_reading_electricity_currently_returned
            icon: mdi:transmission-tower-export
          - type: entity
            entity: sensor.dsmr_consumption_gas_currently_delivered
            icon: mdi:fire
          - type: entity
            entity: sensor.dsmr_day_consumption_total_cost
            icon: mdi:currency-eur
          - type: entity
            entity: sensor.co2_signal_co2_intensity
            icon: mdi:molecule-co2
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid rgba(180, 190, 254, 0.18);
              
              box-shadow: none;
              padding: 10px;
            }
