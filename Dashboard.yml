title: Dashboard
decluttering_templates:
  quick_button:
    card:
      type: custom:button-card
      entity: '[[entity]]'
      name: '[[name]]'
      icon: '[[icon]]'
      tap_action:
        action: '[[action]]'
      show_state: false
      styles:
        card:
          - border-radius: 16px
          - padding: 10px 12px
          - height: 64px
        icon:
          - width: 20px
        name:
          - font-size: 13px
          - font-weight: 600
views:
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: repeat(12, 1fr)
      grid-auto-rows: min-content
      grid-gap: 12px
      margin: 0
    cards:
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - icon: mdi:home
            type: template
            content: >
              {% if is_state('group.persons', 'home') %}Home{% else %}Away{%
              endif %}
            icon_color: >
              {% if is_state('group.persons', 'home') %}green{% else %}amber{%
              endif %}
            tap_action:
              action: more-info
              entity: group.persons
          - icon: mdi:shield-home
            type: template
            tap_action:
              entity: alarm_control_panel.alarm
              action: more-info
            content: |
              {% if is_state('alarm_control_panel.alarm', 'armed_away')
                    or is_state('alarm_control_panel.alarm', 'armed_home')
                    or is_state('alarm_control_panel.alarm', 'armed_night') %}
                Armed
              {% else %}
                Disarmed
              {% endif %}
            icon_color: |
              {% if is_state('alarm_control_panel.alarm', 'armed_away')
                    or is_state('alarm_control_panel.alarm', 'armed_home')
                    or is_state('alarm_control_panel.alarm', 'armed_night') %}
                green
              {% else %}
                red
              {% endif %}
          - icon: mdi:solar-power
            type: template
            content: '{{ states(''sensor.inverter_total_power'') }} W'
            icon_color: yellow
          - icon: mdi:download-network
            type: template
            content: >
              {{ states('sensor.speedtest_download')|round(0) }} / {{
              states('sensor.speedtest_upload')|round(0) }}
            icon_color: blue
          - icon: mdi:update
            type: template
            content: |
              {% set updates = [
                states('update.home_assistant_core_update'),
                states('update.home_assistant_operating_system_update'),
                states('update.home_assistant_supervisor_update'),
                states('update.hacs_update'),
                states('update.mikrotik_router_update'),
                states('update.proxmox_ve_update'),
                states('update.synology_dsm_update'),
                states('update.synology_nas_dsm_update'),
                states('update.zigbee2mqtt_update'),
                states('update.esphome_update'),
                states('update.z_wave_js_ui_update'),
                states('update.studio_code_server_update')
              ] %} {{ updates | select('eq', 'on') | list | count }} updates
            icon_color: >
              {% set updates = [
                states('update.home_assistant_core_update'),
                states('update.home_assistant_operating_system_update'),
                states('update.home_assistant_supervisor_update'),
                states('update.hacs_update'),
                states('update.mikrotik_router_update'),
                states('update.proxmox_ve_update'),
                states('update.synology_dsm_update'),
                states('update.synology_nas_dsm_update'),
                states('update.zigbee2mqtt_update'),
                states('update.esphome_update'),
                states('update.z_wave_js_ui_update'),
                states('update.studio_code_server_update')
              ] %} {% if (updates | select('eq', 'on') | list | count) > 0
              %}amber{% else %}green{% endif %}
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid rgba(180, 190, 254, 0.18);
              
              box-shadow: none;
              padding: 10px;
            }
            mushroom-template-chip, mushroom-entity-chip {
              margin: 2px !important;
            }
        view_layout:
          grid-column: 1 / 13
      - type: grid
        columns: 4
        square: false
        cards:
          - type: custom:button-card
            entity: alarm_control_panel.alarm # TODO: set to more generic "home security status" sensor that combines alarm state, surveillance station home mode and NAS security status
            name: Security
            icon: mdi:shield-home
            show_state: true
            tap_action:
              action: navigate
              navigation_path: /ha-dashboard/security
            styles:
              card:
                - border-radius: 22px
                - padding: 18px 12px
                - border: 1px solid rgba(180, 190, 254, 0.18)
              icon:
                - width: 34px
              name:
                - font-size: 17px
                - font-weight: 600
              state:
                - font-size: 14px
            state:
              - value: disarmed
                color: rgb(243, 139, 168)
              - value: armed_home
                color: rgb(166, 227, 161)
              - value: armed_away
                color: rgb(137, 180, 250)
              - value: armed_night
                color: rgb(203, 166, 247)
          - type: custom:button-card
            entity: input_boolean.current_light_state # TODO: set to more generic "home security status" sensor that combines alarm state, surveillance station home mode and NAS security status
            name: Lights
            icon: mdi:lightbulb
            show_state: true
            tap_action:
              action: navigate
              navigation_path: /ha-dashboard/home
            styles:
              card:
                - border-radius: 22px
                - padding: 18px 12px
                - border: 1px solid rgba(180, 190, 254, 0.18)
              icon:
                - width: 34px
              name:
                - font-size: 17px
                - font-weight: 600
              state:
                - font-size: 14px
            state:
              - value: disarmed
                color: rgb(243, 139, 168)
              - value: armed_home
                color: rgb(166, 227, 161)
              - value: armed_away
                color: rgb(137, 180, 250)
              - value: armed_night
                color: rgb(203, 166, 247)
          - type: custom:button-card
            entity: sensor.dsmr_reading_electricity_currently_delivered
            name: Power
            icon: mdi:flash
            show_state: true
            tap_action:
              action: navigate
              navigation_path: /ha-dashboard/energy
            state_display: >
              [[[ return `Import
              ${states['sensor.dsmr_reading_electricity_currently_delivered']?.state
              ?? '-'} KW | Export
              ${states['sensor.dsmr_reading_electricity_currently_returned']?.state
              ?? '-'} KW`; ]]]
            styles:
              card:
                - border-radius: 22px
                - padding: 18px 12px
                - border: 1px solid rgba(180, 190, 254, 0.18)
              icon:
                - width: 34px
              name:
                - font-size: 17px
                - font-weight: 600
              state:
                - font-size: 14px
            color: rgb(137, 180, 250)
          - type: custom:button-card
            entity: binary_sensor.prometheus_status # TODO: change to more generic "homelab health" sensor
            name: Homelab
            icon: mdi:chart-line
            show_state: true
            tap_action:
              action: navigate
              navigation_path: /ha-dashboard/homelab
            styles:
              card:
                - border-radius: 22px
                - padding: 18px 12px
                - border: 1px solid rgba(180, 190, 254, 0.18)
              icon:
                - width: 34px
              name:
                - font-size: 17px
                - font-weight: 600
              state:
                - font-size: 14px
            state:
              - value: 'on'
                color: rgb(166, 227, 161)
              - value: 'off'
                color: rgb(243, 139, 168)
        view_layout:
          grid-column: 1 / 13
      - type: grid
        columns: 3
        square: false
        cards:
          - show_current: true
            show_forecast: true
            type: weather-forecast
            entity: weather.forecast_home
            forecast_type: daily
          - type: custom:calendar-card-pro
            entities:
              - calendar.afvalinfo_thuis_calendar
              - calendar.kyokushin_karate
              - calendar.persoonlijk
          - type: entities
            entities:
              - entity: sensor.afvalinfo_thuis_trash_type_today
              - entity: sensor.afvalinfo_thuis_trash_type_tomorrow
              - entity: sensor.afvalinfo_thuis_restafval_2
              - entity: sensor.afvalinfo_thuis_papier_2
        view_layout:
          grid-column: 1 / 13
      - type: grid
        columns: 3
        square: false
        cards:
          - type: grid
            title: Live power trend
            view_layout:
              grid-area: quick
            columns: 1
            square: false
            cards:
            - type: custom:apexcharts-card
              header:
                show: true
                show_states: true
                colorize_states: true
              graph_span: 12h
              now:
                show: true
              series:
                - entity: sensor.inverter_total_power
                  transform: 'return x / 1000;' # convert KW to W
                  name: Solar
                  type: line
                  group_by:
                    func: avg
                    duration: 5min
                - entity: sensor.dsmr_reading_electricity_currently_delivered
                  name: Import
                  type: line
                  group_by:
                    func: avg
                    duration: 5min
                - entity: sensor.dsmr_reading_electricity_currently_returned
                  name: Export
                  type: line
                  group_by:
                    func: avg
                    duration: 5min
              card_mod:
                style: |
                  ha-card {
                    border-radius: 22px;
                    border: 1px solid rgba(180, 190, 254, 0.18);
                    
                    box-shadow: none;
                  }
              view_layout:
                grid-column: 1 / 7            
          - type: grid
            title: Quick actions
            view_layout:
              grid-area: quick
            columns: 2
            square: false
            cards:
              - type: custom:decluttering-card
                template: quick_button
                variables:
                  - entity: input_boolean.start_ha_morning
                  - name: Morning
                  - icon: mdi:weather-sunset-up
                  - action: toggle
              - type: custom:decluttering-card
                template: quick_button
                variables:
                  - entity: input_boolean.start_ha_night_routine
                  - name: Night
                  - icon: mdi:weather-night
                  - action: toggle
              - type: custom:button-card
                entity: vacuum.roombot
                name: Start vacuum
                icon: mdi:robot-vacuum
                tap_action:
                  action: call-service
                  service: vacuum.start
                  target:
                    entity_id: vacuum.roombot
                show_state: false
                styles:
                  card:
                    - border-radius: 16px
                    - padding: 10px 12px
                    - height: 64px
                  icon:
                    - width: 20px
                  name:
                    - font-size: 13px
                    - font-weight: 600
              - type: custom:button-card
                entity: input_button.run_speedtest
                name: Run speedtest
                icon: mdi:speedometer
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.run_speedtest
                show_state: false
                styles:
                  card:
                    - border-radius: 16px
                    - padding: 10px 12px
                    - height: 64px
                  icon:
                    - width: 20px
                  name:
                    - font-size: 13px
                    - font-weight: 600
          
          - type: custom:auto-entities
            view_layout:
              grid-area: issues
            card:
              type: grid
              title: Requires attention
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: binary_sensor.*low_battery*
                  state: 'on'
                  options:
                    type: custom:button-card
                    entity: this.entity_id
                    icon: mdi:battery-alert
                    show_name: true
                    show_state: true
                    tap_action:
                      action: more-info
                    styles:
                      card:
                        - border-radius: 16px
                        - padding: 10px 12px
                        - height: 70px
                        - border-width: 1px
                        - border-style: solid
                        - border-color: rgba(220, 70, 70, 0.60)
                      name:
                        - font-size: 12px
                        - font-weight: 600
                      state:
                        - font-size: 10px
                        - opacity: 0.75
                      icon:
                        - color: rgb(220, 70, 70)
                - entity_id: binary_sensor.*replace_battery*
                  state: 'on'
                  options:
                    type: custom:button-card
                    entity: this.entity_id
                    icon: mdi:battery-alert-variant-outline
                    show_name: true
                    show_state: true
                    tap_action:
                      action: more-info
                    styles:
                      card:
                        - border-radius: 16px
                        - padding: 10px 12px
                        - height: 70px
                        - border-width: 1px
                        - border-style: solid
                        - border-color: rgba(220, 70, 70, 0.60)
                      name:
                        - font-size: 12px
                        - font-weight: 600
                      state:
                        - font-size: 10px
                        - opacity: 0.75
                      icon:
                        - color: rgb(220, 70, 70)
                - entity_id: binary_sensor.*tamper*
                  state: 'on'
                  options:
                    type: custom:button-card
                    entity: this.entity_id
                    icon: mdi:shield-alert
                    show_name: true
                    show_state: true
                    tap_action:
                      action: more-info
                    styles:
                      card:
                        - border-radius: 16px
                        - padding: 10px 12px
                        - height: 70px
                        - border-width: 1px
                        - border-style: solid
                        - border-color: rgba(220, 70, 70, 0.60)
                      name:
                        - font-size: 12px
                        - font-weight: 600
                      state:
                        - font-size: 10px
                        - opacity: 0.75
                      icon:
                        - color: rgb(220, 70, 70)
                - entity_id: binary_sensor.*over_load*
                  state: 'on'
                  options:
                    type: custom:button-card
                    entity: this.entity_id
                    icon: mdi:flash-alert
                    show_name: true
                    show_state: true
                    tap_action:
                      action: more-info
                    styles:
                      card:
                        - border-radius: 16px
                        - padding: 10px 12px
                        - height: 70px
                        - border-width: 1px
                        - border-style: solid
                        - border-color: rgba(220, 70, 70, 0.60)
                      name:
                        - font-size: 12px
                        - font-weight: 600
                      state:
                        - font-size: 10px
                        - opacity: 0.75
                      icon:
                        - color: rgb(220, 70, 70)
                - entity_id: binary_sensor.*over_current*
                  state: 'on'
                  options:
                    type: custom:button-card
                    entity: this.entity_id
                    icon: mdi:current-ac
                    show_name: true
                    show_state: true
                    tap_action:
                      action: more-info
                    styles:
                      card:
                        - border-radius: 16px
                        - padding: 10px 12px
                        - height: 70px
                        - border-width: 1px
                        - border-style: solid
                        - border-color: rgba(220, 70, 70, 0.60)
                      name:
                        - font-size: 12px
                        - font-weight: 600
                      state:
                        - font-size: 10px
                        - opacity: 0.75
                      icon:
                        - color: rgb(220, 70, 70)
                - entity_id: binary_sensor.*warnings
                  state: 'on'
                  options:
                    type: custom:button-card
                    entity: this.entity_id
                    icon: mdi:alert
                    show_name: true
                    show_state: true
                    tap_action:
                      action: more-info
                    styles:
                      card:
                        - border-radius: 16px
                        - padding: 10px 12px
                        - height: 70px
                        - border-width: 1px
                        - border-style: solid
                        - border-color: rgba(220, 70, 70, 0.60)
                      name:
                        - font-size: 12px
                        - font-weight: 600
                      state:
                        - font-size: 10px
                        - opacity: 0.75
                      icon:
                        - color: rgb(220, 70, 70)
                - domain: update
                  state: 'on'
                  options:
                    type: custom:button-card
                    entity: this.entity_id
                    icon: mdi:update
                    show_name: true
                    show_state: true
                    tap_action:
                      action: more-info
                    styles:
                      card:
                        - border-radius: 16px
                        - padding: 10px 12px
                        - height: 70px
                        - border-width: 1px
                        - border-style: solid
                        - border-color: rgba(220, 160, 60, 0.55)
                      name:
                        - font-size: 12px
                        - font-weight: 600
                      state:
                        - font-size: 10px
                        - opacity: 0.75
                      icon:
                        - color: rgb(220, 160, 60)
              exclude: []
            sort:
              method: friendly_name
            show_empty: false
          
        view_layout:
          grid-column: 1 / 13
  
