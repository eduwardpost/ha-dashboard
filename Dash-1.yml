  - title: Admin
    path: admin
    icon: mdi:server
    type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr
      grid-template-areas: |
        "updates backup zigbee"
        "synology network containers"
        "printer3d external lowbatt"
      mediaquery:
        '(max-width: 1000px)':
          grid-template-columns: 1fr 1fr
          grid-template-areas: |
            "updates backup"
            "zigbee synology"
            "network containers"
            "printer3d external"
            "lowbatt lowbatt"
        '(max-width: 800px)':
          grid-template-columns: 1fr
          grid-template-areas: |
            "updates"
            "backup"
            "zigbee"
            "synology"
            "network"
            "containers"
            "printer3d"
            "external"
            "lowbatt"
    cards:
      - type: custom:auto-entities
        view_layout:
          grid-area: updates
        card:
          type: grid
          title: Pending updates
          columns: 2
          square: false
        card_param: cards
        filter:
          include:
            - domain: update
              state: 'on'
              options:
                type: custom:button-card
                entity: this.entity_id
                icon: mdi:update
                show_name: true
                show_state: true
                tap_action:
                  action: more-info
                styles:
                  card:
                    - border-radius: 16px
                    - padding: 10px 12px
                    - height: 70px
                    - border-width: 1px
                    - border-style: solid
                    - border-color: rgba(220, 160, 60, 0.55)
                  name:
                    - font-size: 12px
                    - font-weight: 600
                  state:
                    - font-size: 10px
                    - opacity: 0.75
                  icon:
                    - color: rgb(220, 160, 60)
          exclude: []
        sort:
          method: friendly_name
        show_empty: false
      - type: entities
        title: Backup
        view_layout:
          grid-area: backup
        entities:
          - sensor.backup_backup_manager_state
          - sensor.backup_next_scheduled_automatic_backup
          - sensor.backup_last_successful_automatic_backup
          - sensor.backup_last_attempted_automatic_backup
          - event.backup_automatic_backup
      - type: entities
        title: Zigbee / Z-Wave
        view_layout:
          grid-area: zigbee
        entities:
          - binary_sensor.zigbee2mqtt_bridge_connection_state
          - sensor.zigbee2mqtt_bridge_version
          - sensor.zigbee2mqtt_bridge_coordinator_version
          - switch.zigbee2mqtt_bridge_permit_join
          - button.zigbee2mqtt_bridge_restart
          - sensor.z_stick_gen5_usb_controller_status
          - update.z_stick_gen5_usb_controller_firmware
          - binary_sensor.slzb_mr1_internet
          - sensor.slzb_mr1_connection_mode
          - sensor.slzb_mr1_core_chip_temp
          - sensor.slzb_mr1_zigbee_chip_temp
          - button.slzb_mr1_core_restart
          - button.slzb_mr1_zigbee_restart
      - type: grid
        title: Synology
        view_layout:
          grid-area: synology
        columns: 2
        square: false
        cards:
          - type: custom:decluttering-card
            template: status_tile
            variables:
              - entity: binary_sensor.synology_nas_security_status
              - name: Security
              - icon: mdi:nas
          - type: custom:button-card
            entity: update.synology_nas_dsm_update
            icon: mdi:update
            show_name: true
            show_state: true
            tap_action:
              action: more-info
            styles:
              card:
                - border-radius: 16px
                - padding: 10px 12px
                - height: 70px
                - border-width: 1px
                - border-style: solid
                - border-color: rgba(220, 160, 60, 0.55)
              name:
                - font-size: 12px
                - font-weight: 600
              state:
                - font-size: 10px
                - opacity: 0.75
              icon:
                - color: rgb(220, 160, 60)
          - type: custom:decluttering-card
            template: status_tile
            variables:
              - entity: sensor.synology_nas_volume_1_status
              - name: Volume 1
              - icon: mdi:harddisk
          - type: custom:decluttering-card
            template: status_tile
            variables:
              - entity: sensor.synology_nas_disk_1_status
              - name: Disk 1
              - icon: mdi:harddisk
          - type: custom:decluttering-card
            template: status_tile
            variables:
              - entity: sensor.synology_nas_disk_2_status
              - name: Disk 2
              - icon: mdi:harddisk
          - type: custom:decluttering-card
            template: status_tile
            variables:
              - entity: sensor.synology_nas_disk_3_status
              - name: Disk 3
              - icon: mdi:harddisk
      - type: grid
        title: Network gear
        view_layout:
          grid-area: network
        columns: 3
        square: false
        cards:
          - type: custom:decluttering-card
            template: sensor_status_tile
            variables:
              - entity: sensor.garage_state
              - name: Garage
              - icon: mdi:switch
          - type: custom:decluttering-card
            template: sensor_status_tile
            variables:
              - entity: sensor.zolder_state
              - name: Zolder
              - icon: mdi:switch
          - type: custom:decluttering-card
            template: sensor_status_tile
            variables:
              - entity: sensor.beneden_state
              - name: Beneden
              - icon: mdi:switch
          - type: custom:decluttering-card
            template: sensor_status_tile
            variables:
              - entity: sensor.boven_state
              - name: Boven
              - icon: mdi:switch
          - type: custom:decluttering-card
            template: sensor_status_tile
            variables:
              - entity: sensor.us_24_poe_250w_state
              - name: Core switch
              - icon: mdi:network
          - type: custom:decluttering-card
            template: sensor_status_tile
            variables:
              - entity: sensor.usw_flex_2_5g_5_state
              - name: Flex 2.5G
              - icon: mdi:ethernet-switch
      - type: custom:auto-entities
        view_layout:
          grid-area: containers
        card:
          type: entities
          title: Problem containers/services
        filter:
          include:
            - entity_id: binary_sensor.*_status
              state: 'off'
            - entity_id: sensor.*_status
              state: down
            - entity_id: sensor.*_status
              state: offline
          exclude: []
        show_empty: false
      - type: custom:stack-in-card
        view_layout:
          grid-area: printer3d
        cards:
          - type: picture-glance
            camera_image: camera.octoprint_camera
            entities:
              - binary_sensor.octoprint_printing
              - sensor.octoprint_job_percentage
          - type: entities
            entities:
              - sensor.octoprint_current_state
              - sensor.octoprint_job_percentage
              - sensor.octoprint_estimated_finish_time
              - sensor.octoprint_actual_bed_temp
              - sensor.octoprint_actual_tool0_temp
              - button.octoprint_pause_job
              - button.octoprint_resume_job
              - button.octoprint_stop_job
      - type: custom:auto-entities
        view_layout:
          grid-area: external
        card:
          type: entities
          title: External services down
        filter:
          include:
            - entity_id: sensor.*_status
              state: down
            - entity_id: sensor.*_status
              state: offline
          exclude:
            - entity_id: sensor.home_assistant_status
            - entity_id: sensor.mariadb_status
            - entity_id: sensor.haproxy_status
        show_empty: false
      - type: custom:auto-entities
        view_layout:
          grid-area: lowbatt
        card:
          type: entities
          title: Low battery devices
        filter:
          include:
            - entity_id: binary_sensor.*low_battery*
              state: 'on'
            - entity_id: binary_sensor.*replace_battery*
              state: 'on'
          exclude: []
        sort:
          method: friendly_name
        show_empty: false
